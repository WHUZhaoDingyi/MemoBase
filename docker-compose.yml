version: "3.9"

# Milvus 本地一键启动（包含 etcd 与 MinIO）
# 适用场景：研发/测试环境快速验证向量检索能力
services:
  # etcd：Milvus 的元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: milvus-etcd
    restart: unless-stopped
    environment:
      # 自动压缩历史版本，避免无限增长
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      # 后端存储额度（4GB）
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      # 快照频率（写入次数）
      - ETCD_SNAPSHOT_COUNT=50000
      # 兼容旧 API（本地调试）
      - ETCD_ENABLE_V2=true
      # 允许无认证访问（本地环境）
      - ALLOW_NONE_AUTHENTICATION=yes
    command:
      # 监听客户端与对外发布地址
      - etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
    ports:
      # etcd 对外端口
      - "2379:2379"
    volumes:
      # etcd 数据持久化目录
      - ./volumes/etcd:/etcd
    networks:
      - milvus-net

  # MinIO：Milvus 的对象存储，用于持久化向量数据与索引
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    restart: unless-stopped
    environment:
      # MinIO 管理账号（本地环境建议改为自定义）
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    command:
      # 控制台与 API 服务端口
      - minio
      - server
      - /minio_data
      - --console-address
      - ":9001"
    ports:
      # MinIO API 端口
      - "9000:9000"
      # MinIO 控制台端口
      - "9001:9001"
    volumes:
      # MinIO 数据持久化目录
      - ./volumes/minio:/minio_data
    networks:
      - milvus-net

  # Milvus 独立模式（standalone）
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: milvus
    restart: unless-stopped
    depends_on:
      - etcd
      - minio
    environment:
      # 连接 etcd 与 MinIO
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      # MinIO bucket 名称（默认）
      - MINIO_BUCKET_NAME=milvus-bucket
      # Milvus 本地日志级别
      - LOG_LEVEL=info
    command:
      # 明确启动独立模式
      - milvus
      - run
      - standalone
    ports:
      # gRPC 端口（客户端主要使用）
      - "19530:19530"
      # HTTP/REST 端口
      - "9091:9091"
    volumes:
      # Milvus 数据持久化目录
      - ./volumes/milvus:/var/lib/milvus
    networks:
      - milvus-net

# 服务间通信网络
networks:
  milvus-net:
    driver: bridge
